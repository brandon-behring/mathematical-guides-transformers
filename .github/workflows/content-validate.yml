name: content-validate

on:
  push:
    branches: [main]
    paths: ['src/content/**', 'src/content.config.ts', 'bibliography.bib', 'package.json', 'package-lock.json', 'scripts/**', 'tests/**', 'figures/**', 'docs/manifests/**', 'docs/plans/active/**', '.claude/skills/**', '.gitleaks.toml', '.github/workflows/content-validate.yml']
  pull_request:
    paths: ['src/content/**', 'src/content.config.ts', 'bibliography.bib', 'package.json', 'package-lock.json', 'scripts/**', 'tests/**', 'figures/**', 'docs/manifests/**', 'docs/plans/active/**', '.claude/skills/**', '.gitleaks.toml', '.github/workflows/content-validate.yml']

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
        # pagedjs-cli → puppeteer@20 tries to download Chromium in a postinstall
        # script; that fetch intermittently hangs on CI (6h timeout). No CI job
        # needs a browser (nothing runs `npm run pdf`), so skip the download.
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
      - run: npm run validate
      - run: npm run check:corpus
      - run: npm run test:id-migration
      - run: npm run check:id-migration
      - run: npm run check:properties

  properties:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: python -m unittest discover -s tests/properties -p 'test_*.py' -v
