name: content-validate

on:
  push:
    branches: [main]
    paths: ['src/content/**', 'src/content.config.ts', '.github/workflows/content-validate.yml']
  pull_request:
    paths: ['src/content/**', 'src/content.config.ts']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx book-scaffold validate --preset research-portfolio
