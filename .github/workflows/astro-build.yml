name: astro-build

on:
  push:
    branches: [main]
    paths: ['src/**', 'figures/**', 'public/**', 'astro.config.mjs', 'package.json', 'package-lock.json', '.github/workflows/astro-build.yml']
  pull_request:
    paths: ['src/**', 'figures/**', 'public/**', 'astro.config.mjs', 'package.json', 'package-lock.json']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          BOOK_PRESET: research-portfolio
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
