# Cloudflare Workers (static assets) config — mathematical-guides-transformers.
#
# The transformers guide of the mathematical-guides family. Builds with
# base=/transformers/ (astro.config.mjs) and is served two ways:
#   1. Via the hub proxy: mathematical.brandon-behring.dev/transformers/* — the
#      brandon-behring-mathematical hub worker forwards here through its
#      GUIDE_TRANSFORMERS service binding (this worker needs no domain of its own).
#   2. Standalone (this worker's own *.workers.dev URL): public/_redirects maps
#      the base path onto the dist-root asset paths.
#
# Deployed via GitHub Actions + deploy-workflows@v2.0.2 (account-wide standard).
# Deploy this worker BEFORE the hub, or the hub's service binding won't resolve.

name = "brandon-behring-mathematical-transformers"
compatibility_date = "2026-05-27"

[assets]
directory = "./dist"
