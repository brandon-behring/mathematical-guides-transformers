# Cloudflare Workers (static assets) config — mathematical-guides-transformers.
#
# This guide is the "transformers" CHILD Worker of the mathematical-guides family hub.
# It is served at mathematical.brandon-behring.dev/transformers/* and is reached ONLY
# through the hub's GUIDE_TRANSFORMERS service binding — it has no custom domain of its
# own. The hub forwards the full /transformers/... path; because Astro emits assets at
# the dist root, `main = _worker.js` strips the /transformers prefix before serving from
# ASSETS (see _worker.js). Deploy this child BEFORE the hub so the binding resolves.
#
# Deployed via GitHub Actions + the deploy-workflows reusable workflow
# (.github/workflows/deploy.yml). Full runbook: docs/notes/cloudflare-deploy.md.

name = "brandon-behring-mathematical-transformers"
compatibility_date = "2026-05-27"
main = "_worker.js"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true
